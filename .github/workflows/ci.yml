name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install mise tools
        run: mise install

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2

      - name: Install Ruby and Bun dependencies
        run: |
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- bun install --frozen-lockfile

      - name: Run checks
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: mise run ci
