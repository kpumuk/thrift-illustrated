name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Install mise tools
        run: mise install

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2

      - name: Install Ruby and Bun dependencies
        run: |
          mise exec -- bundle install --jobs 4 --retry 3
          mise exec -- bun install --frozen-lockfile

      - name: Run checks
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: mise run ci
